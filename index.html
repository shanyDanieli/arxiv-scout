<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>arXiv Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#faf8f5;--bgw:#f3efe9;--bgc:#fff;--tx:#1a1612;--ts:#6b6158;--tm:#a39888;--bd:#e8e0d4;--bl:#f0ebe3;--blue:#2563eb;--amber:#b45309;--green:#0d7c5f;--violet:#7c3aed;--ss:0 1px 2px rgba(26,22,18,.04);--sm:0 4px 16px rgba(26,22,18,.06);--sl:0 8px 32px rgba(26,22,18,.08)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;min-height:100vh}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes spin{to{transform:rotate(360deg)}}
.hdr{background:var(--bgc);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;box-shadow:var(--ss)}.hi{max-width:960px;margin:0 auto;padding:16px 28px}.ht{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.logo{font-family:'Newsreader',serif;font-size:26px;font-weight:700;letter-spacing:-.03em}.logo span{color:var(--blue)}.lsub{font-size:12px;color:var(--tm);margin-left:12px}
.br{display:flex;gap:6px;flex-wrap:wrap}.b{padding:7px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:7px;color:var(--ts);font-size:12.5px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}.b:hover{background:var(--bgw);color:var(--tx)}.b:disabled{opacity:.5;cursor:default}.ba{background:var(--blue);border-color:var(--blue);color:#fff}.ba:hover{background:#1d4ed8}
.tabs{display:flex;gap:0;margin-top:14px;border-bottom:2px solid var(--bl)}.tab{padding:8px 18px;font-size:13.5px;font-weight:500;color:var(--tm);cursor:pointer;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;font-family:'Outfit',sans-serif;transition:all .15s}.tab:hover{color:var(--ts)}.tab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.dc{display:none;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;animation:fadeUp .2s}.dc.vis{display:flex}.di{padding:7px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:7px;font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--tx)}.di:focus{outline:none;border-color:var(--blue)}
.flt{display:flex;gap:10px;margin-top:12px;align-items:center;flex-wrap:wrap}.sr{flex:1;min-width:200px;padding:9px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:13.5px;font-family:'Outfit',sans-serif;outline:none;transition:border-color .15s}.sr:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}.sr::placeholder{color:var(--tm)}
.cps{display:flex;gap:5px;flex-wrap:wrap}.cp{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:var(--bgc);color:var(--ts);transition:all .15s;font-family:'Outfit',sans-serif}.cp:hover{border-color:#ccc}.cp.on{background:var(--tx);color:#fff;border-color:var(--tx)}
.sb2{max-width:960px;margin:0 auto;padding:16px 28px 0;display:flex;gap:12px;flex-wrap:wrap}.spill{display:flex;align-items:center;gap:6px;padding:5px 13px;background:var(--bgc);border:1px solid var(--bl);border-radius:20px;font-size:12px;color:var(--ts);box-shadow:var(--ss);animation:fadeUp .3s}.sdot{width:7px;height:7px;border-radius:50%}.snum{font-weight:600;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:12px}
main{max-width:960px;margin:0 auto;padding:20px 28px 80px}
.gsec{margin-bottom:36px;animation:fadeUp .3s}.ghdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--bl);cursor:pointer;user-select:none}.gico{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}.gnam{font-family:'Newsreader',serif;font-size:19px;font-weight:600}.gbdg{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;font-family:'JetBrains Mono',monospace}.gchv{margin-left:auto;font-size:14px;color:var(--tm);transition:transform .2s}.gchv.col{transform:rotate(-90deg)}
.paper{background:var(--bgc);border:1px solid var(--bl);border-radius:10px;padding:16px 20px;margin-bottom:8px;cursor:pointer;transition:all .2s;box-shadow:var(--ss)}.paper:hover{box-shadow:var(--sm);border-color:var(--bd);transform:translateY(-1px)}
.ptop{display:flex;justify-content:space-between;gap:16px}.pbod{flex:1;min-width:0}.pttl{font-family:'Newsreader',serif;font-size:15.5px;font-weight:600;line-height:1.45}.pmeta{margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}.paut{font-size:12.5px;color:var(--tm)}
.plnk{display:flex;gap:5px;flex-shrink:0;align-self:flex-start;margin-top:2px}.plnk a{font-size:11px;font-weight:600;text-decoration:none;padding:4px 10px;border-radius:5px;font-family:'Outfit',sans-serif;text-transform:uppercase;letter-spacing:.03em;transition:opacity .15s}.plnk a:hover{opacity:.8}
.ptags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}.ktag{font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:4px;font-family:'JetBrains Mono',monospace}
.subcat{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace;background:#f0f0f0;color:#555;white-space:nowrap}.subcat.GA{background:#dbeafe;color:#1e40af}.subcat.CO{background:#ede9fe;color:#5b21b6}.subcat.HE{background:#fce7f3;color:#9d174d}.subcat.SR{background:#fef3c7;color:#92400e}.subcat.EP{background:#d1fae5;color:#065f46}.subcat.IM{background:#e0e7ff;color:#3730a3}
.atype{font-size:10px;font-weight:600;padding:2px 7px;border-radius:3px;font-family:'JetBrains Mono',monospace;white-space:nowrap}.atype.new{background:#d1fae5;color:#065f46}
.pabs{margin-top:14px;padding-top:14px;border-top:1px solid var(--bl);font-family:'Newsreader',serif;font-size:14px;line-height:1.7;color:var(--ts);animation:fadeUp .2s}.pcats{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap}.ctag{font-size:10px;font-weight:500;padding:2px 6px;border-radius:3px;background:var(--bg);color:var(--tm);font-family:'JetBrains Mono',monospace;border:1px solid var(--bl)}
mark{background:#fef3c7;color:#92400e;border-radius:2px;padding:0 2px}
.ld{text-align:center;padding:70px 20px}.spinner{width:28px;height:28px;border:2.5px solid var(--bd);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
.mov{display:none;position:fixed;inset:0;background:rgba(26,22,18,.4);backdrop-filter:blur(6px);z-index:1000;justify-content:center;align-items:flex-start;padding-top:50px;overflow-y:auto}.mov.vis{display:flex}.mod{background:var(--bgc);border:1px solid var(--bd);border-radius:14px;padding:32px;max-width:620px;width:92%;box-shadow:var(--sl);margin-bottom:60px}
.mtit{font-family:'Newsreader',serif;font-size:22px;font-weight:700}.mlab{font-size:11.5px;color:var(--tm);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:5px}.minp,.mtxt{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-family:'JetBrains Mono',monospace;box-sizing:border-box}.minp{font-size:13px}.mtxt{font-size:12px;resize:vertical;line-height:1.6}.minp:focus,.mtxt:focus{outline:none;border-color:var(--blue)}
@media(max-width:640px){.hi,.sb2,main{padding-left:16px;padding-right:16px}.logo{font-size:22px}.b{padding:6px 10px;font-size:11.5px}}
</style>
</head>
<body>
<header class="hdr"><div class="hi">
<div class="ht"><div style="display:flex;align-items:baseline"><div class="logo">arXiv<span>Scout</span></div><div class="lsub" id="dateLabel"></div></div>
<div class="br"><button class="b" onclick="doFetch()" id="refreshBtn">&#8635; Refresh</button><button class="b" onclick="showCfg()">&#9881; Keywords</button><button class="b ba" onclick="shareLink()">&#128279; Share</button></div></div>
<div class="tabs"><button class="tab on" id="tabToday" onclick="switchTab('today')">Today's Papers</button><button class="tab" id="tabRange" onclick="switchTab('range')">Date Range</button></div>
<div class="dc" id="dateCtl"><label style="font-size:12.5px;color:var(--ts);font-weight:500">From</label><input type="date" class="di" id="dateFrom"/><label style="font-size:12.5px;color:var(--ts);font-weight:500">To</label><input type="date" class="di" id="dateTo"/><button class="b ba" onclick="fetchRange()" style="font-size:12px">Fetch</button></div>
<div class="flt"><input class="sr" placeholder="Search titles, abstracts, authors..." oninput="filterQ=this.value;render()" id="searchBox"/><div class="cps" id="chipRow"></div></div>
</div></header>
<div class="sb2" id="statsBar"></div>
<main id="content"><div class="ld"><div class="spinner"></div><div style="color:var(--tm);font-size:14px">Scanning today's arXiv listings...</div></div></main>
<div class="mov" id="cfgModal"><div class="mod">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px"><div class="mtit">Configure Keywords</div><button onclick="hideCfg()" style="background:none;border:none;color:var(--tm);font-size:22px;cursor:pointer">&times;</button></div>
<div id="cfgBody"></div>
<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:24px"><button class="b" onclick="hideCfg()">Cancel</button><button class="b ba" onclick="saveCfg()">Save &amp; Reload</button></div>
</div></div>
<script>
var GS={"Galaxy Evolution":{ac:"var(--blue)",tB:"#dbeafe",tT:"#1e40af",ic:"\ud83c\udf0c",iB:"#eff4ff",lB:"#eff4ff"},"Dwarf Galaxies":{ac:"var(--amber)",tB:"#fef3c7",tT:"#92400e",ic:"\u2726",iB:"#fef7ed",lB:"#fef7ed"},"Low Surface Brightness":{ac:"var(--green)",tB:"#d1fae5",tT:"#065f46",ic:"\u25d0",iB:"#eefbf5",lB:"#eefbf5"},"Dark Matter":{ac:"var(--violet)",tB:"#ede9fe",tT:"#5b21b6",ic:"\u25c9",iB:"#f5f0ff",lB:"#f5f0ff"}};
var DFS={ac:"#666",tB:"#eee",tT:"#555",ic:"\u25cf",iB:"#f0f0f0",lB:"#f5f5f5"};
function gst(n){return GS[n]||DFS}
var KG={"Galaxy Evolution":["galaxy evolution","galaxy formation","stellar mass","star formation history","quenching","mass function","high redshift","high-redshift","luminosity function"],"Dwarf Galaxies":["dwarf galaxy","dwarf galaxies","satellite galaxy","satellite galaxies","Local Group","Magellanic","LMC","SMC","dwarf spheroidal"],"Low Surface Brightness":["low surface brightness","ultra diffuse","ultra-diffuse","UDG","LSB","diffuse galaxy","diffuse galaxies","faint galaxy"],"Dark Matter":["dark matter","rotation curve","rotation curves","halo mass","NFW","mass profile","velocity dispersion","dark matter halo","mass-to-light","CDM","LCDM","dark matter substructure"]};
var DATA=null,activeGrp="all",filterQ="",activeTab="today",collapsed={};
function mkRe(kw){var e=kw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");return new RegExp("(?<![a-zA-Z])"+e+"(?:s|es)?(?:[-\u2013]\\w+)?(?![a-zA-Z])","gi")}
function kwMatch(t,kw){return mkRe(kw).test(t)}
function hl(t,kws){if(!kws||!kws.length)return t;var r=t;for(var i=0;i<kws.length;i++)r=r.replace(mkRe(kws[i]),function(m){return"<mark>"+m+"</mark>"});return r}
function loadHash(){var h=location.hash.slice(1);if(!h)return;try{var p=JSON.parse(atob(h));if(p.g)KG=p.g}catch(e){}}
function shareLink(){var h=btoa(JSON.stringify({g:KG}));navigator.clipboard.writeText(location.origin+location.pathname+"#"+h).then(function(){alert("Share link copied!")})}
function switchTab(t){activeTab=t;document.getElementById("tabToday").className="tab"+(t==="today"?" on":"");document.getElementById("tabRange").className="tab"+(t==="range"?" on":"");document.getElementById("dateCtl").className="dc"+(t==="range"?" vis":"");if(t==="today")fetchToday()}
function doFetch(){activeTab==="today"?fetchToday():fetchRange()}
function showLoading(msg){document.getElementById("content").innerHTML='<div class="ld"><div class="spinner"></div><div style="color:var(--tm);font-size:14px">'+msg+'</div></div>';document.getElementById("statsBar").innerHTML=""}
async function proxyFetch(url){var proxies=[function(u){return"https://api.allorigins.win/raw?url="+encodeURIComponent(u)},function(u){return"https://corsproxy.io/?url="+encodeURIComponent(u)}];for(var i=0;i<proxies.length;i++){try{var r=await fetch(proxies[i](url));if(r.ok){var t=await r.text();if(t.length>200)return t}}catch(e){console.warn("Proxy "+i+" failed:",e)}}throw new Error("All CORS proxies failed")}
async function fetchToday(){showLoading("Fetching today's new arXiv astro-ph listings...");document.getElementById("refreshBtn").disabled=true;try{var html=await proxyFetch("https://arxiv.org/list/astro-ph/new");var result=parseNewPage(html);DATA=doMatch(result.papers);if(result.date)DATA.date=result.date}catch(e){console.error(e);document.getElementById("content").innerHTML='<div style="text-align:center;padding:50px 20px"><div style="font-size:48px;margin-bottom:16px">\u26a0\ufe0f</div><div style="font-family:Newsreader,serif;font-size:18px;color:var(--ts)">Failed to fetch arXiv listings</div><div style="font-size:13px;color:var(--tm);margin-top:6px">The CORS proxy may be down. Try refreshing.</div></div>';document.getElementById("refreshBtn").disabled=false;return}document.getElementById("refreshBtn").disabled=false;render()}
function parseNewPage(html){var doc=(new DOMParser()).parseFromString(html,"text/html");var papers=[],date="";var h3s=doc.querySelectorAll("h3");for(var i=0;i<h3s.length;i++){var m=h3s[i].textContent.match(/listings\s+for\s+(.+)/i);if(m){date=m[1].trim();break}}var dts=doc.querySelectorAll("dl > dt");var dds=doc.querySelectorAll("dl > dd");var count=Math.min(dts.length,dds.length);for(var i=0;i<count;i++){var dt=dts[i],dd=dds[i];var aid="";var aLinks=dt.querySelectorAll("a");for(var j=0;j<aLinks.length;j++){var href=aLinks[j].getAttribute("href")||"";var im=href.match(/(\d{4}\.\d{4,5})/);if(im){aid=im[1];break}}if(!aid){var im2=dt.textContent.match(/(\d{4}\.\d{4,5})/);if(im2)aid=im2[1]}if(!aid)continue;var dtText=dt.textContent.toLowerCase();if(dtText.indexOf("cross-list")>=0||dtText.indexOf("replace")>=0)continue;var atype="new";var titleEl=dd.querySelector(".list-title");var title=titleEl?titleEl.textContent.replace(/^Title:\s*/i,"").replace(/\s+/g," ").trim():"";var authEl=dd.querySelector(".list-authors");var authors=authEl?authEl.textContent.replace(/^Authors:\s*/i,"").replace(/\s+/g," ").trim():"";var absEl=dd.querySelector("p.mathjax");var abstract=absEl?absEl.textContent.replace(/\s+/g," ").trim():"";var subjEl=dd.querySelector(".list-subjects");var cats=[],primaryCat="";if(subjEl){var sm=subjEl.textContent.match(/\b(astro-ph\.\w+|hep-\w+|gr-qc|nucl-\w+|math\.\w+|cs\.\w+|stat\.\w+|cond-mat\.\w+|physics\.\w+|quant-ph)\b/g);if(sm)cats=sm.filter(function(v,idx,a){return a.indexOf(v)===idx})}for(var j=0;j<cats.length;j++){if(cats[j].indexOf("astro-ph.")===0){primaryCat=cats[j];break}}papers.push({arxiv_id:aid,title:title,authors:authors,abstract:abstract,link:"https://arxiv.org/abs/"+aid,pdf_link:"https://arxiv.org/pdf/"+aid,categories:cats,primary_cat:primaryCat,announce_type:atype})}return{papers:papers,date:date}}
async function fetchRange(){var from=document.getElementById("dateFrom").value,to=document.getElementById("dateTo").value;if(!from||!to){alert("Please select both dates.");return}showLoading("Fetching papers from "+from+" to "+to+"...");var fs=from.replace(/-/g,"")+"0000",ts=to.replace(/-/g,"")+"2359";try{var q="search_query=cat:astro-ph*+AND+submittedDate:["+fs+"+TO+"+ts+"]&sortBy=submittedDate&sortOrder=descending&max_results=500";var txt=await proxyFetch("https://export.arxiv.org/api/query?"+q);var papers=parseAtom(txt);DATA=doMatch(papers);DATA.date=from+" \u2192 "+to;render()}catch(e){console.error(e);document.getElementById("content").innerHTML='<div style="text-align:center;padding:50px"><div style="font-size:48px;margin-bottom:16px">\u26a0\ufe0f</div><div style="font-family:Newsreader,serif;font-size:18px;color:var(--ts)">Failed to fetch</div></div>'}}
function parseAtom(txt){var doc=(new DOMParser()).parseFromString(txt,"text/xml"),papers=[];var entries=doc.querySelectorAll("entry");for(var i=0;i<entries.length;i++){var entry=entries[i];var id=entry.querySelector("id");id=id?id.textContent:"";var m=id.match(/(\d{4}\.\d{4,5})/);if(!m)continue;var aid=m[1];var tEl=entry.querySelector("title");var title=tEl?(tEl.textContent||"").replace(/\s+/g," ").trim():"";var sEl=entry.querySelector("summary");var summary=sEl?(sEl.textContent||"").replace(/\s+/g," ").trim():"";var aEls=entry.querySelectorAll("author name");var authors=[];for(var j=0;j<aEls.length;j++)authors.push(aEls[j].textContent);var lEls=entry.querySelectorAll("link");var absL="https://arxiv.org/abs/"+aid,pdfL="https://arxiv.org/pdf/"+aid;for(var j=0;j<lEls.length;j++){if(lEls[j].getAttribute("type")==="text/html")absL=lEls[j].getAttribute("href")||absL;if(lEls[j].getAttribute("title")==="pdf")pdfL=lEls[j].getAttribute("href")||pdfL}var cEls=entry.querySelectorAll("category");var cats=[],primaryCat="";for(var j=0;j<cEls.length;j++){var t=cEls[j].getAttribute("term");if(t){cats.push(t);if(!primaryCat&&t.indexOf("astro-ph.")===0)primaryCat=t}}papers.push({arxiv_id:aid,title:title,authors:authors.join(", "),abstract:summary,link:absL,pdf_link:pdfL,categories:cats,primary_cat:primaryCat,announce_type:"api"})}return papers}
function doMatch(papers){var seen={},uniq=[];for(var i=0;i<papers.length;i++){var p=papers[i];if(!seen[p.arxiv_id]){seen[p.arxiv_id]=1;uniq.push(p)}}var matched=[];for(var i=0;i<uniq.length;i++){var paper=uniq[i],txt=paper.title+" "+paper.abstract,mg={};for(var gn in KG){var kws=KG[gn],hits=[];for(var k=0;k<kws.length;k++){if(kwMatch(txt,kws[k]))hits.push(kws[k])}if(hits.length)mg[gn]=hits}if(Object.keys(mg).length){var sc=0;for(var gn in mg)sc+=mg[gn].length;matched.push(Object.assign({},paper,{matched_groups:mg,relevance_score:sc}))}}matched.sort(function(a,b){return b.relevance_score-a.relevance_score});var grouped={};for(var gn in KG)grouped[gn]=[];for(var i=0;i<matched.length;i++){var p=matched[i];for(var gn in p.matched_groups){if(grouped[gn])grouped[gn].push(p)}}return{date:new Date().toISOString().slice(0,10),total_fetched:uniq.length,total_matched:matched.length,grouped_papers:grouped,all_matched:matched}}
function subcatLabel(cat){if(!cat)return"";var s=cat.replace("astro-ph.","");return'<span class="subcat '+s+'">'+s+'</span>'}
function renderPaper(p,gn){var s=gst(gn),allKw=[],mg=p.matched_groups||{};for(var k in mg)allKw=allKw.concat(mg[k]);var id=p.arxiv_id,au=p.authors.length>130?p.authors.slice(0,130)+"\u2026":p.authors;var tags="";for(var k in mg){var st=gst(k),kws=mg[k];for(var i=0;i<kws.length;i++)tags+='<span class="ktag" style="background:'+st.tB+';color:'+st.tT+'">'+kws[i]+'</span>'}return'<div class="paper" onclick="toggleAbs(\''+id+'\')"><div class="ptop"><div class="pbod"><div class="pttl">'+hl(p.title,allKw)+'</div><div class="pmeta">'+subcatLabel(p.primary_cat)+'<span class="paut">'+au+'</span></div></div><div class="plnk"><a href="'+p.link+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="background:'+s.lB+';color:'+s.tT+'">ABS</a><a href="'+p.pdf_link+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="background:'+s.lB+';color:'+s.tT+'">PDF</a></div></div><div class="ptags">'+tags+'</div><div class="pabs" id="abs-'+id+'" style="display:none">'+hl(p.abstract,allKw)+'<div class="pcats">'+(p.categories||[]).map(function(c){return'<span class="ctag">'+c+'</span>'}).join("")+'</div></div></div>'}
function toggleAbs(id){var e=document.getElementById("abs-"+id);if(e)e.style.display=e.style.display==="none"?"block":"none"}
function renderGroup(name,papers){var s=gst(name),col=collapsed[name],body="";if(!col){if(papers.length){for(var i=0;i<papers.length;i++)body+=renderPaper(papers[i],name)}else body='<div style="padding:16px 20px;color:var(--tm);font-size:13px;font-style:italic">No matches in this category</div>'}return'<div class="gsec"><div class="ghdr" onclick="toggleGrp(\''+name+'\')"><div class="gico" style="background:'+s.iB+'">'+s.ic+'</div><div class="gnam">'+name+'</div><div class="gbdg" style="background:'+s.tB+';color:'+s.tT+'">'+papers.length+'</div><div class="gchv'+(col?" col":"")+'">&#x25be;</div></div>'+body+'</div>'}
function toggleGrp(n){collapsed[n]=!collapsed[n];render()}
function render(){if(!DATA)return;var d=DATA;document.getElementById("dateLabel").textContent=d.date;var sh='<div class="spill"><div class="sdot" style="background:var(--tx)"></div>Fetched: <span class="snum">'+d.total_fetched+'</span></div><div class="spill"><div class="sdot" style="background:var(--blue)"></div>Matched: <span class="snum">'+d.total_matched+'</span></div>';for(var gn in d.grouped_papers){var s=gst(gn);sh+='<div class="spill"><div class="sdot" style="background:'+s.ac+'"></div>'+gn+': <span class="snum">'+d.grouped_papers[gn].length+'</span></div>'}document.getElementById("statsBar").innerHTML=sh;var ch='<button class="cp'+(activeGrp==="all"?" on":"")+'" onclick="setGrp(\'all\')">All</button>';for(var gn in KG){var c=(d.grouped_papers[gn]||[]).length;ch+='<button class="cp'+(activeGrp===gn?" on":"")+'" onclick="setGrp(\''+gn+'\')">'+gn+' ('+c+')</button>'}document.getElementById("chipRow").innerHTML=ch;var el=document.getElementById("content"),html="";if(filterQ){var q=filterQ.toLowerCase();var f=d.all_matched.filter(function(p){return p.title.toLowerCase().indexOf(q)>=0||p.abstract.toLowerCase().indexOf(q)>=0||p.authors.toLowerCase().indexOf(q)>=0});html='<div style="font-size:13px;color:var(--tm);margin-bottom:16px;font-family:JetBrains Mono,monospace">'+f.length+' result'+(f.length!==1?"s":"")+" for \""+filterQ+'"</div>';for(var i=0;i<f.length;i++)html+=renderPaper(f[i],Object.keys(f[i].matched_groups)[0])}else if(activeGrp==="all"){for(var gn in KG)html+=renderGroup(gn,d.grouped_papers[gn]||[])}else html=renderGroup(activeGrp,d.grouped_papers[activeGrp]||[]);if(d.total_matched===0&&!filterQ)html='<div style="text-align:center;padding:50px 20px"><div style="font-size:48px;margin-bottom:16px;opacity:.7">\ud83d\udd2d</div><div style="font-family:Newsreader,serif;font-size:18px;color:var(--ts)">No papers matched your keywords today</div><div style="font-size:13px;color:var(--tm);margin-top:6px">Try broadening your keywords or adding more categories.</div></div>';el.innerHTML=html}
function setGrp(v){activeGrp=v;render()}
function showCfg(){document.getElementById("cfgModal").classList.add("vis");var h='';for(var n in KG){var s=gst(n);h+='<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center"><div class="mlab" style="color:'+s.tT+'">'+n+'</div><button onclick="rmGrp(\''+n+'\')" style="background:none;border:none;color:var(--tm);font-size:11px;cursor:pointer;text-decoration:underline">remove</button></div><textarea class="mtxt" id="cfg-'+n+'" rows="3">'+KG[n].join(", ")+'</textarea></div>'}h+='<div style="display:flex;gap:8px;margin-top:16px"><input class="minp" id="newGrpName" placeholder="New group name..." style="flex:1"/><button class="b" onclick="addGrp()">+ Add</button></div>';document.getElementById("cfgBody").innerHTML=h}
function hideCfg(){document.getElementById("cfgModal").classList.remove("vis")}
function addGrp(){var n=document.getElementById("newGrpName").value.trim();if(n&&!KG[n]){KG[n]=[];showCfg()}}
function rmGrp(n){delete KG[n];showCfg()}
function saveCfg(){for(var n in KG){var e=document.getElementById("cfg-"+n);if(e)KG[n]=e.value.split(",").map(function(s){return s.trim()}).filter(Boolean)}location.hash=btoa(JSON.stringify({g:KG}));hideCfg();doFetch()}
(function(){var t=new Date(),w=new Date(t);w.setDate(t.getDate()-7);document.getElementById("dateTo").value=t.toISOString().slice(0,10);document.getElementById("dateFrom").value=w.toISOString().slice(0,10);loadHash();fetchToday()})();
</script>
</body>
</html>
